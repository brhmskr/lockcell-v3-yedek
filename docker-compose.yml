services:
  traefik:
    image: traefik:v3.2
    container_name: traefik_v3
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=lockcell_net"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=ibrahimseker@tmtmakine.com.tr"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./acme.json:/letsencrypt/acme.json
    networks:
      - lockcell_net

  db:
    image: postgres:16-alpine
    container_name: lockcell_db_v3
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: lockcell123
      POSTGRES_DB: lockcell_v3
    volumes:
      - pgdata_v3:/var/lib/postgresql/data
    networks:
      - lockcell_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lockcell_v3"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: lockcell_app_v3
    restart: unless-stopped
    environment:
      PORT: "5001"
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:lockcell123@db:5432/lockcell_v3
      SESSION_SECRET: v3_icin_yepyeni_gizli_anahtar
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./attached_assets:/app/attached_assets
    networks:
      - lockcell_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=lockcell_net"
      - "traefik.http.routers.lockcell.rule=Host(`v3.lockcellcrm.com`)"
      - "traefik.http.routers.lockcell.entrypoints=websecure"
      - "traefik.http.routers.lockcell.tls.certresolver=letsencrypt"
      - "traefik.http.services.lockcell.loadbalancer.server.port=5001"

volumes:
  pgdata_v3:

networks:
  lockcell_net:
    name: lockcell_net
    driver: bridge
